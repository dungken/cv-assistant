services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cv_assistant
    ports:
      - "5433:5432"
    volumes:
      - ${DATA_PATH:-.}/data/postgres_data:/var/lib/postgresql/data

  chromadb:
    image: chromadb/chroma:0.5.5
    ports:
      - "8002:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - ${DATA_PATH:-.}/knowledge_base/chroma_db:/chroma/chroma

  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    ports:
      - "8081:8081"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres;Database=cv_assistant;Username=postgres;Password=postgres"
    depends_on:
      - postgres

  skill_service:
    build:
      context: .
      dockerfile: services/skill_service/Dockerfile
    ports:
      - "5002:5002"
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      - chromadb

  chatbot_service:
    build:
      context: .
      dockerfile: services/chatbot_service/Dockerfile
    ports:
      - "5004:5004"
    environment:
      CHAT_OLLAMA_URL: "http://host.docker.internal:11434"
      CHAT_NER_URL: "http://ner_service:5001"
      CHROMA_HOST: "chromadb"
      CHROMA_PORT: "8000"
      CHAT_MODEL_NAME: "llama3.2:1b"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ner_service:
    build:
      context: .
      dockerfile: services/ner_service/Dockerfile
    ports:
      - "5005:5001"
    volumes:
      - ./models:/app/models

  career_service:
    build:
      context: .
      dockerfile: services/career_service/Dockerfile
    ports:
      - "5003:5003"
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
    depends_on:
      - chromadb

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api_gateway

volumes:
  postgres_data:
