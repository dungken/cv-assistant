services:
  # ─── Core Infrastructure ──────────────────────────────────────────

  postgres_main:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cv_assistant
    ports:
      - "5433:5432"
    volumes:
      - ${DATA_PATH:-.}/data/postgres_main:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Skill Service Dedicated Infra ────────────────────────────────

  skill_postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: skill_user
      POSTGRES_PASSWORD: skill_password
      POSTGRES_DB: skill_data
    ports:
      - "5434:5432"
    volumes:
      - ${DATA_PATH:-.}/data/skill_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
    restart: unless-stopped

  skill_chromadb:
    image: chromadb/chroma:0.5.5
    ports:
      - "8003:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - ${DATA_PATH:-.}/knowledge_base/skill_chroma:/chroma/chroma
    restart: unless-stopped

  # ─── Career Service Dedicated Infra ───────────────────────────────

  career_chromadb:
    image: chromadb/chroma:0.5.5
    ports:
      - "8004:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - ${DATA_PATH:-.}/knowledge_base/career_chroma:/chroma/chroma
    restart: unless-stopped

  # ─── Chatbot Service Dedicated Infra ──────────────────────────────

  chatbot_chromadb:
    image: chromadb/chroma:0.5.5
    ports:
      - "8005:8000"
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - ${DATA_PATH:-.}/knowledge_base/chatbot_chroma:/chroma/chroma
    restart: unless-stopped

  # ─── Python Microservices ──────────────────────────────────────────

  ner_service:
    build:
      context: .
      dockerfile: services/ner_service/Dockerfile
    ports:
      - "5005:5001"
    volumes:
      - ./models:/app/models
    environment:
      SERVICE_PORT: "5001"
    restart: unless-stopped

  skill_service:
    build:
      context: .
      dockerfile: services/skill_service/Dockerfile
    ports:
      - "5002:5002"
    environment:
      CHROMA_HOST: skill_chromadb
      CHROMA_PORT: "8000"
      DATABASE_URL: "postgresql://skill_user:skill_password@skill_postgres:5432/skill_data"
      NER_SERVICE_URL: "http://ner_service:5001"
    depends_on:
      skill_chromadb:
        condition: service_started
      skill_postgres:
        condition: service_healthy
    restart: unless-stopped

  career_service:
    build:
      context: .
      dockerfile: services/career_service/Dockerfile
    ports:
      - "5003:5003"
    environment:
      CHROMA_HOST: career_chromadb
      CHROMA_PORT: "8000"
    depends_on:
      career_chromadb:
        condition: service_started
    restart: unless-stopped

  chatbot_service:
    build:
      context: .
      dockerfile: services/chatbot_service/Dockerfile
    ports:
      - "5004:5004"
    environment:
      CHAT_OLLAMA_URL: "http://host.docker.internal:11434"
      CHAT_NER_URL: "http://ner_service:5001"
      CHAT_SKILL_SERVICE_URL: "http://skill_service:5002"
      CHAT_CAREER_SERVICE_URL: "http://career_service:5003"
      CHROMA_HOST: "chatbot_chromadb"
      CHROMA_PORT: "8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      chatbot_chromadb:
        condition: service_started
    restart: unless-stopped

  # ─── API Gateway (.NET) ────────────────────────────────────────────

  api_gateway:
    build:
      context: .
      dockerfile: services/api_gateway/Dockerfile
    ports:
      - "8081:8081"
    environment:
      ConnectionStrings__DefaultConnection: "Host=postgres_main;Database=cv_assistant;Username=postgres;Password=postgres"
      Services__NerUrl: "http://ner_service:5001"
      Services__SkillUrl: "http://skill_service:5002"
      Services__CareerUrl: "http://career_service:5003"
      Services__ChatbotUrl: "http://chatbot_service:5004"
    depends_on:
      postgres_main:
        condition: service_healthy
    restart: unless-stopped

  # ─── Frontend ──────────────────────────────────────────────────────

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api_gateway:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_main:
  skill_postgres:
